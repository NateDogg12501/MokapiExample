services:
  mokapi:
    image: mokapi/mokapi:latest
    ports:
      - "${MOKAPI_DASHBOARD_PORT:-8080}:8080"   # mokapi dashboard + mail/HTTP REST APIs
      - "${MOKAPI_API_PORT:-8090}:8090"         # mocked weatherstack API
      - "${MOKAPI_SMTP_PORT:-2525}:2525"        # mocked SMTP server (mail.yaml)
    environment:
      MOKAPI_PROVIDERS_FILE_DIRECTORY: /mokapi
    volumes:
      - ./mokapi:/mokapi

  localstack:
    # As of March 23 2026, localstack/localstack:latest merged Community and
    # Pro into one image that requires a LOCALSTACK_AUTH_TOKEN (free account
    # signup at app.localstack.cloud) even to start — see LOCALSTACK_AUTH_TOKEN
    # in .env.example for how to get one.
    image: localstack/localstack:latest
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    environment:
      SERVICES: sqs
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # LocalStack for Snowflake is a *separate paid product* from the base
  # localstack image above (SQS, etc.) — different Docker image, different
  # licensing, even though it reuses the same LOCALSTACK_AUTH_TOKEN env var
  # here (see LOCALSTACK_AUTH_TOKEN in .env.example: your token must be
  # entitled to LocalStack for Snowflake specifically, e.g. via its 30-day
  # free trial, or this container exits on the same kind of license check
  # the SQS localstack container does).
  localstack-snowflake:
    image: localstack/snowflake:latest
    ports:
      - "${SNOWFLAKE_LOCALSTACK_PORT:-4567}:4566"
    environment:
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
      # Lets the backend/init containers reach this service by its plain
      # docker-compose service name ("localstack-snowflake") instead of the
      # public snowflake.localhost.localstack.cloud DNS trick the docs use
      # for host-machine access, which doesn't resolve to this container
      # from inside another one. Verified against localstack's own
      # multi-container sample (localstack-samples/localstack-snowflake-samples).
      # SF_HOSTNAME_REGEX (a regex pattern) is what that sample uses, but as
      # of this LocalStack version it logs "deprecated and no longer
      # supported" and silently falls back to the default hostname only —
      # confirmed live this broke the mock (login-request kept returning
      # 200 but the client never considered the session established,
      # retrying forever). SF_HOSTNAMES (exact, comma-separated, no regex)
      # is the supported replacement.
      SF_HOSTNAMES: localstack-snowflake
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: creates the mock database/table localstack-snowflake serves,
  # then exits — same "provisioning is an infra concern, not the
  # integration layer's job" reasoning as localstack-init below, applied to
  # Snowflake. See snowflake-init/init.js.
  snowflake-mock-init:
    build: ./snowflake-init
    depends_on:
      localstack-snowflake:
        condition: service_healthy
    environment:
      SNOWFLAKE_MOCK_HOST: localstack-snowflake
      SNOWFLAKE_MOCK_PORT: 4566
      SNOWFLAKE_TABLE: ${SNOWFLAKE_TABLE:-person}

  # One-shot: creates the SQS queue localstack serves, then exits. Queue
  # provisioning lives here (infra), not in backend/src/sqsClient.js
  # (integration layer) — the backend only ever resolves an existing queue
  # for both sources, symmetric with how the real AWS queue must already
  # exist. Uses the same SQS_QUEUE_NAME as the backend so there's one
  # source of truth for the queue name. Re-run this with
  # `docker compose up localstack-init` (or a plain `docker compose up`) if
  # you ever restart the `localstack` container on its own — its queue
  # state is in-memory only, so a restart wipes it and this needs to run
  # again to recreate it.
  localstack-init:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    command: ["--endpoint-url=http://localstack:4566", "sqs", "create-queue", "--queue-name", "${SQS_QUEUE_NAME:-mokapi-demo-queue}"]

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      WEATHERSTACK_ACCESS_KEY: ${WEATHERSTACK_ACCESS_KEY:-}
      WEATHERSTACK_BASE_URL: http://api.weatherstack.com/current
      MOKAPI_URL: http://mokapi:8090/current
      SCENARIOS_FILE_PATH: /mokapi-data/scenarios.json
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      MOKAPI_MAIL_SMTP_HOST: mokapi
      MOKAPI_MAIL_SMTP_PORT: 2525
      MOKAPI_MAIL_API_URL: http://mokapi:8080
      MOKAPI_MAIL_SERVICE_TITLE: Mokapi Email Demo
      SQS_QUEUE_NAME: ${SQS_QUEUE_NAME:-mokapi-demo-queue}
      LOCALSTACK_SQS_ENDPOINT: http://localstack:4566
      LOCALSTACK_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      SNOWFLAKE_TABLE: ${SNOWFLAKE_TABLE:-person}
      SNOWFLAKE_MOCK_HOST: localstack-snowflake
      SNOWFLAKE_MOCK_PORT: 4566
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
      SNOWFLAKE_USERNAME: ${SNOWFLAKE_USERNAME:-}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-PUBLIC}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-}
    volumes:
      - ./frontend:/app/frontend:ro
      - ./mokapi:/mokapi-data
    depends_on:
      # Deliberately NOT depends_on localstack-init/snowflake-mock-init here
      # (even though they're what actually provision the AWS/Snowflake tabs'
      # local data) — backend must keep starting cleanly regardless of
      # whether localstack ever becomes usable (e.g. no LOCALSTACK_AUTH_TOKEN
      # set, or a token not entitled to LocalStack for Snowflake), the same
      # way the REST and Email tabs work independently of whether their own
      # credentials are configured. If an init service hasn't finished yet,
      # that tab's mock option just errors until it does.
      - mokapi
      - localstack
      - localstack-snowflake
